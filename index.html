<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DN_Trade | Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Noto+Sans+TC:wght@400;700&display=swap');
        
        :root {
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body { 
            background: #000; color: #eee; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; 
            overflow: hidden; margin: 0; 
        }
        
        .neon-green { color: #39FF14; }
        
        /* 響應式抽屜 */
        .drawer { position: fixed; top: 0; bottom: calc(75px + var(--safe-bottom)); width: 85%; background: #080808; z-index: 100; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #left-drawer { left: 0; transform: translateX(-100%); border-right: 1px solid #1a1a1a; }
        #right-drawer { right: 0; transform: translateX(100%); border-left: 1px solid #1a1a1a; }
        #left-drawer.active { transform: translateX(0); }
        #right-drawer.active { transform: translateX(0); }

        @media (min-width: 1024px) {
            .drawer { position: static; width: auto; transform: none !important; }
            .mobile-only { display: none; }
        }

        /* 頂部導航 */
        .nav-item { color: #444; font-size: 14px; font-weight: 600; cursor: pointer; padding: 10px 0; position: relative; transition: 0.2s; }
        .nav-item.active { color: #39FF14; }
        .nav-item.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: #39FF14; }

        /* iPhone 底部選單優化 */
        .mobile-bottom-nav { 
            display: none; position: fixed; bottom: 0; width: 100%; 
            height: calc(75px + var(--safe-bottom)); 
            background: rgba(10, 10, 10, 0.95); 
            backdrop-filter: blur(20px);
            border-top: 1px solid #1a1a1a; z-index: 110;
            padding-bottom: var(--safe-bottom);
        }
        
        @media (max-width: 1024px) { 
            .mobile-bottom-nav { display: flex; justify-content: space-around; align-items: center; } 
            /* 縮短高度確保 TV 工具列不被遮擋 */
            #chart-container { height: calc(100% - 10px); padding-bottom: 25px; }
        }

        .btn-nav { font-size: 16px; font-weight: 700; color: #555; letter-spacing: -0.01em; transition: 0.2s; }
        .btn-nav.active { color: #39FF14; }

        /* Watchlist */
        .list-item { background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 8px; padding: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .list-item.active { border-color: #39FF14; background: rgba(57, 255, 20, 0.05); }

        input { background: #111; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 8px; width: 100%; font-size: 14px; outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-14 flex items-center justify-between px-5 border-b border-white/5 bg-black z-50">
        <div class="flex items-center gap-6">
            <div class="text-xl font-bold tracking-tighter">
                <span class="neon-green">DN</span><span class="text-white">_Trade</span>
            </div>
            <nav class="flex gap-5 overflow-x-auto no-scrollbar" id="main-nav">
                <div class="nav-item active" data-cat="forex">外匯</div>
                <div class="nav-item" data-cat="crypto">加密</div>
                <div class="nav-item" data-cat="stock">股市</div>
            </nav>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-12 overflow-hidden p-1 gap-1 relative">
        
        <aside id="left-drawer" class="col-span-12 lg:col-span-2 drawer lg:block">
            <div class="p-6 border-b border-white/5">
                <span class="text-[11px] font-bold text-orange-500 uppercase tracking-widest mb-2 block">Bitopro USDT</span>
                <div id="bito-last" class="text-3xl font-mono neon-green tracking-tighter">--.---</div>
            </div>
            <div class="p-6 border-b border-white/5">
                <span class="text-[11px] font-bold text-blue-500 uppercase tracking-widest mb-2 block">Max USDT</span>
                <div id="max-last" class="text-3xl font-mono text-blue-400 tracking-tighter">--.---</div>
            </div>
        </aside>

        <section id="chart-container" class="col-span-12 lg:col-span-8 bg-black overflow-hidden relative">
            <div id="tv_main" class="h-full w-full"></div>
        </section>

        <aside id="right-drawer" class="col-span-12 lg:col-span-2 drawer lg:flex flex-col">
            <div class="p-4 text-[11px] text-gray-500 font-bold border-b border-white/5 flex justify-between uppercase tracking-widest">
                Watchlist <span>Sort</span>
            </div>
            <div id="watchlist" class="flex-1 overflow-y-auto p-3 no-scrollbar"></div>
            <div class="p-4 border-t border-white/5">
                <input type="text" id="new-sym" placeholder="輸入代碼 (例: FX_IDC:USDTWD)">
            </div>
        </aside>
    </main>

    <div class="mobile-bottom-nav">
        <button onclick="toggleDrawer('left')" id="btn-left" class="btn-nav">實時匯率</button>
        <button onclick="closeDrawers()" id="btn-chart" class="btn-nav active">交易圖表</button>
        <button onclick="toggleDrawer('right')" id="btn-right" class="btn-nav">自選清單</button>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const STORAGE_KEY = 'DN_Trade_V18_1';
        const defaultLists = {
            forex: ['FX_IDC:USDTWD', 'OANDA:USDTWD', 'FX_IDC:USDCNY'],
            crypto: ['BINANCE:BTCUSDT', 'BINANCE:ETHUSDT'],
            stock: ['NASDAQ:NVDA', 'NASDAQ:TSLA']
        };

        let currentCat = 'forex';
        let storage = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultLists;

        // 啟動強制加載 FX_IDC:USDTWD
        window.onload = () => {
            loadChart('FX_IDC:USDTWD'); 
            fetchPrices();
            renderWatchlist(false);
        };

        async function fetchPrices() {
            try {
                const bito = await fetch('https://api.bitopro.com/v3/tickers/usdt_twd');
                const bitoJ = await bito.json();
                document.getElementById('bito-last').innerText = parseFloat(bitoJ.data.lastPrice).toFixed(3);
                
                const max = await fetch('https://max-api.maicoin.com/api/v2/tickers/usdttwd');
                const maxJ = await max.json();
                document.getElementById('max-last').innerText = parseFloat(maxJ.last).toFixed(3);
            } catch (e) {}
        }
        setInterval(fetchPrices, 3000);

        function toggleDrawer(side) {
            const left = document.getElementById('left-drawer');
            const right = document.getElementById('right-drawer');
            const btns = { left: document.getElementById('btn-left'), right: document.getElementById('btn-right'), chart: document.getElementById('btn-chart') };
            Object.values(btns).forEach(b => b.classList.remove('active'));
            if (side === 'left') {
                left.classList.toggle('active');
                right.classList.remove('active');
                if(left.classList.contains('active')) btns.left.classList.add('active');
                else btns.chart.classList.add('active');
            } else {
                right.classList.toggle('active');
                left.classList.remove('active');
                if(right.classList.contains('active')) btns.right.classList.add('active');
                else btns.chart.classList.add('active');
            }
        }

        function closeDrawers() {
            document.getElementById('left-drawer').classList.remove('active');
            document.getElementById('right-drawer').classList.remove('active');
            document.getElementById('btn-chart').classList.add('active');
            document.getElementById('btn-left').classList.remove('active');
            document.getElementById('btn-right').classList.remove('active');
        }

        function loadChart(symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "15",
                "theme": "dark",
                "style": "1",
                "locale": "zh_TW",
                "container_id": "tv_main",
                "allow_symbol_change": true,
                "hide_side_toolbar": false,
                "details": false,
                "hotlist": false,
                "calendar": false
            });
            updateActiveState(symbol);
            if (window.innerWidth < 1024) closeDrawers();
        }

        function updateActiveState(symbol) {
            document.querySelectorAll('.list-item').forEach(el => {
                el.classList.toggle('active', el.dataset.sym === symbol);
            });
        }

        function renderWatchlist(shouldLoadFirst = true) {
            const listEl = document.getElementById('watchlist');
            listEl.innerHTML = '';
            storage[currentCat].forEach(sym => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.dataset.sym = sym;
                div.innerHTML = `
                    <div class="flex-1" onclick="loadChart('${sym}')">
                        <div class="font-bold text-[14px]">${sym.split(':')[1] || sym}</div>
                        <div class="text-[10px] text-gray-600 font-mono uppercase">${sym.split(':')[0]}</div>
                    </div>
                    <button onclick="removeSym('${sym}', event)" class="text-gray-600 px-2 text-xl">&times;</button>`;
                listEl.appendChild(div);
            });
            if (shouldLoadFirst && storage[currentCat].length > 0) loadChart(storage[currentCat][0]);
        }

        window.removeSym = function(sym, e) {
            e.stopPropagation();
            storage[currentCat] = storage[currentCat].filter(s => s !== sym);
            save(); renderWatchlist(false);
        };

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(storage)); }

        document.querySelectorAll('.nav-item').forEach(nav => {
            nav.onclick = function() {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                currentCat = this.dataset.cat;
                renderWatchlist(true);
            };
        });

        document.getElementById('new-sym').onkeypress = function(e) {
            if (e.key === 'Enter' && this.value) {
                const s = this.value.toUpperCase();
                if(!storage[currentCat].includes(s)) {
                    storage[currentCat].push(s);
                    save(); renderWatchlist(false);
                }
                this.value = '';
            }
        };

        new Sortable(document.getElementById('watchlist'), {
            animation: 150, onEnd: () => {
                storage[currentCat] = Array.from(document.querySelectorAll('.list-item')).map(el => el.dataset.sym);
                save();
            }
        });
    </script>
</body>
</html>
